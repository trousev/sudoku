<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sudoku Manager{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#166534',
                            800: '#14532d',
                            900: '#14532d',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { font-size: 12pt; }
            .sudoku-grid { width: 100% !important; max-width: 18cm !important; }
        }
        .sudoku-cell {
            width: 3rem;
            height: 3rem;
            text-align: center;
            font-size: 1.25rem;
        }
        .sudoku-cell:nth-child(3n) {
            border-right: 2px solid #166534;
        }
        .sudoku-cell:nth-child(9n) {
            border-right: 1px solid #ccc;
        }
        .sudoku-row:nth-child(3n) .sudoku-cell {
            border-bottom: 2px solid #166534;
        }
        @media (max-width: 640px) {
            .sudoku-cell {
                width: 2rem;
                height: 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-primary-700 text-white shadow-lg no-print">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="{% url 'home' %}" class="text-2xl font-bold">Sudoku Manager</a>
                <a href="{% url 'generate' %}" class="bg-white text-primary-700 px-4 py-2 rounded-lg font-semibold hover:bg-primary-50 transition">
                    Generate New
                </a>
            </div>
        </div>
    </nav>
    
    <main class="max-w-4xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="text-center text-gray-500 py-4 no-print">
        <p>Sudoku Manager - Create and print puzzles</p>
    </footer>
</body>
</html>
