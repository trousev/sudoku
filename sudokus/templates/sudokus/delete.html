{% extends "sudokus/base.html" %}

{% block title %}Delete Sudoku{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-md p-6 max-w-md mx-auto">
    <h1 class="text-3xl font-bold text-red-600 mt-4 mb-4">Delete Sudoku</h1>
    
    <p class="text-gray-700 mb-6">
        Are you sure you want to delete <strong>{{ sudoku.name }}</strong>?
        This action cannot be undone.
    </p>
    
    <form method="post" class="flex gap-4">
        {% csrf_token %}
        <a href="{% url 'detail' sudoku.pk %}" class="flex-1 bg-gray-200 text-gray-700 py-2 px-4 rounded-lg font-semibold hover:bg-gray-300 transition text-center">
            Cancel
        </a>
        <button type="submit" class="flex-1 bg-red-600 text-white py-2 px-4 rounded-lg font-semibold hover:bg-red-700 transition">
            Delete
        </button>
    </form>
</div>
{% endblock %}
